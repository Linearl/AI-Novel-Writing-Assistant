# 高频替换词规则 — 网文常用套路词，权重低（0.2~0.4）
# 来源：木棉写作小红书 OCR 提取
# 这些词本身没问题，但过度使用会让文笔显得单一

rules:
  # === 对话动词 ===
  - key: replaceable-say
    name: 说（高频）
    pattern: "说"
    matchType: word
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：呢喃、低吟、嘶吼、嗤笑、沉吟、轻叹、反问
      - 看语境：轻柔→呢喃；压抑→低吟；轻蔑→嗤笑；犹豫→沉吟

  - key: replaceable-said
    name: 道（高频）
    pattern: "道"
    matchType: word
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：低声道、喊道、喃喃道、冷冷道、朗声道

  # === 动作动词 ===
  - key: replaceable-walk
    name: 走（高频）
    pattern: "走"
    matchType: word
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：闲适/焦虑→踱步；醉酒/虚弱→踉跄；犹豫→徘徊；匆忙→疾行

  - key: replaceable-look
    name: 看（高频）
    pattern: "看"
    matchType: word
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：专注/深情→凝视；不屑→瞥；警惕→窥视；怅惘→远眺

  - key: replaceable-laugh
    name: 笑/轻笑
    pattern: "(笑|轻笑|笑着说)"
    matchType: regex
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：温暖→莞尔；畅快→捧腹；无奈→苦笑；阴鸷→诡笑

  - key: replaceable-cry
    name: 哭（高频）
    pattern: "哭"
    matchType: word
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：压抑→啜泣；哽咽→呜咽；隐忍→垂泪；崩溃→嚎啕

  - key: replaceable-sit
    name: 坐下（高频）
    pattern: "坐下"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：正式→落座；疲惫→瘫坐；蜷缩→蜷坐；踉跄→跌坐

  - key: replaceable-take
    name: 拿（高频）
    pattern: "拿"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：用力→攥紧；细致→轻捻；急切→攫取；珍视→捧起

  - key: replaceable-lower-head
    name: 低头（高频）
    pattern: "低头"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：默许→颔首；羞涩→垂眸；专注→埋首；愧疚→愧赧

  # === 情绪词 ===
  - key: replaceable-fear
    name: 害怕（高频）
    pattern: "害怕"
    matchType: word
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：生理恐惧→战栗；慌乱→心悸；怯懦→瑟缩；惊悚→毛骨悚然

  - key: replaceable-beautiful
    name: 漂亮（高频）
    pattern: "漂亮"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：清新→秀丽；美艳→妩媚；端庄→姝丽；素净→雅致

  # === 环境词 ===
  - key: replaceable-sunlight
    name: 阳光（高频）
    pattern: "阳光"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：温暖→暖阳；苍凉→残阳；清晨→曦光；刺目→眩光；傍晚→斜晖

  - key: replaceable-night
    name: 夜晚（高频）
    pattern: "夜晚"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：黄昏→暮色；深夜→子夜；黎明前→拂晓；幽暗→暝色

  - key: replaceable-rain
    name: 雨（高频）
    pattern: "雨"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：绵密→细雨；凄凉→冷雨；朦胧→烟雨；激烈→暴雨；急促→骤雨

  - key: replaceable-wind
    name: 风（高频）
    pattern: "风"
    matchType: word
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 替换：轻柔→微风；阴冷→阴风；暴戾→狂风；凛冽→朔风

  # === 情感反馈动词（网文高频） ===
  - key: replaceable-blush
    name: 耳尖微红/脸红（高频）
    pattern: "(耳尖微红|耳尖泛红|脸红|面色微红)"
    matchType: regex
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换：抿嘴别过脸、指尖无意识地绞着衣角、目光闪躲
      - 控制频率，一篇文章用一两次即可

  - key: replaceable-restrain
    name: 克制着/强忍着（高频）
    pattern: "(克制着|强忍着|压抑着)"
    matchType: regex
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 用具体动作写克制的状态
      - 如"他握紧的拳头慢慢松开""她深吸一口气，将话咽了回去"

  # === 极迪来源补充 ===
  - key: replaceable-sudden
    name: 忽然/突然（高频）
    pattern: "(忽然|突然)"
    matchType: regex
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 替换（二字）：蓦地、遽然、倏忽、陡然、猝然
      - 替换（三字）：冷不丁、猛地一下、一不留神
      - 替换（四字）：毫无征兆、猝不及防、始料未及、晴天霹雳
      - 替换（短语）：像被人从背后推了一把 / 像一盆冷水兜头浇下

  - key: replaceable-laugh-variant
    name: 轻笑/嗤笑（场景化）
    pattern: "(轻笑|嗤笑|笑着说|笑了笑)"
    matchType: regex
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 优雅从容：嘴角微扬、噙着笑、唇边浮起一丝浅笑
      - 戏谑嘲讽：嗤地一声笑出来、鼻腔里哼出一声笑
      - 温柔宠溺：眼底漾开笑意、轻轻弯了弯嘴角
      - 危险神秘：意味深长地勾了勾唇、笑意不达眼底
      - 无奈苦笑：扯了扯嘴角、苦涩地弯了弯唇
      - 俏皮灵动：眼睛弯成月牙、噗嗤一声笑出来

  - key: replaceable-eye-red-extended
    name: 耳朵微红/眼眶发红（情绪身体反应）
    pattern: "(耳朵微红|耳尖泛红|眼眶发红|眼眶微红)"
    matchType: regex
    category: replaceable_word
    weight: 0.3
    suggestions:
      - 吃醋：攥紧了杯子 / 嘴唇抿成一条线 / 指甲掐进掌心
      - 心痛：像被人捏住了心脏 / 呼吸一滞 / 一口气堵在喉咙
      - 心动：心跳漏了一拍 / 耳边嗡嗡作响 / 手心沁出薄汗
      - 害羞：把脸埋进围巾 / 低头摆弄衣角 / 目光四处躲闪
      - 暧昧：声音不自觉放轻 / 空气突然变稠 / 指尖碰到又缩回
      - 动情：喉结滚动了一下 / 呼吸变得又轻又浅 / 无意识咬住下唇

  - key: replaceable-look-extended
    name: 看（场景化扩展）
    pattern: "^(看|看着|看了看)$"
    matchType: regex
    category: replaceable_word
    weight: 0.2
    suggestions:
      - 专注/深情：凝视、定定地望着、目光钉在XX身上
      - 不屑/轻蔑：瞥了一眼、乜斜、目光扫过就收回
      - 警惕/紧张：窥视、余光瞟着、眼睛一瞬不瞬地盯着
      - 怅惘/回忆：远眺、失神地望着、目光穿过XX落在远处
      - 偷偷/暗恋：悄悄抬眼、从睫毛缝隙里偷看、假装不经意地瞥向
      - 审视/打量：上下打量、目光像X光一样扫过、眼神掂量着
