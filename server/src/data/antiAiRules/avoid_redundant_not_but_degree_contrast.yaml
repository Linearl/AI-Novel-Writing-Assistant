key: avoid_redundant_not_but_degree_contrast
name: 禁止用「不是……而是……」做无意义的程度对比
type: forbidden
severity: medium
description: 禁止用「不是……而是……」仅为了拉出两个仅在程度上有差异的同类动作或状态进行对比，比如“不是普通的跑，而是狂奔”。这种用法看似强调，实则冗余，属于典型AI生成痕迹。人类使用该结构通常用于转折、纠错、因果或超出预期的变化，而非简单程度递进。
detectPatterns:
  - 不是普通的
  - 不是一般的
  - 不是简单的
  - 不是寻常的
  - 不是慢慢地
  - 不是轻轻地
rewriteSuggestion: 如遇「不是A，而是B」且A与B为同动作、状态但仅程度不同的情况，删除整个结构，保留B并替换为更精准有力的单一表述，例如将「不是普通的跑，而是狂奔」改为「她朝他飞奔而去，心脏在胸腔里砰然作响」；将「不是一般的害怕，而是恐惧」改为「一股寒意从脊椎窜上，她本能地后退了半步」。
promptInstruction: 在正文生成中，严禁使用「不是……而是……」来对比两个仅存在程度差异的同类动作、状态或感受。不要为了强调后一个词的程度更高而先给出一个弱化版本。若需突出程度，请直接使用准确的强力动词、形容词，并辅以具体的动作、神态、心理或环境细节描写，而非依赖这种冗余的对比结构。
autoRewrite: true
defaultEnabled: true
defaultGlobalBaseline: true