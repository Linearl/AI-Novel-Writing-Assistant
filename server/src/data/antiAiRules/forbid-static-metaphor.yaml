key: forbid-static-metaphor
name: 禁止静态比喻止于A像B
type: forbidden
severity: medium
description: 禁止比喻停留在"A像B"的静态概括就收笔，必须为喻体补充场景、动作或因果逻辑，让比喻成为有前因后果的微型叙事。
detectPatterns:
  - 像.*一样美
  - 如同.*般
  - 仿佛.*似的
  - 像一个.*般
  - 宛如.*一样
  - 像极了
  - 简直就是
rewriteSuggestion: 为比喻的喻体补充至少一个场景细节或因果逻辑。例如"月亮像白玉盘"→"月亮像被谁擦过的白玉盘，搁在屋檐上方，连上面的纹路都看得分明"；"她的歌声像泉水"→"她的歌声像山涧里刚化冻的泉水，叮叮咚咚地跳过石头，溅起的水珠还带着冬天最后一丝凉意"；"白云离自己很近"→"白云似乎是被风刮跑的白衬衫，一跳脚就能把它抓回来"。
promptInstruction: 使用比喻时禁止止步于"A像B"的静态概括。每个比喻必须为喻体补充至少一个动作或场景细节，让比喻成为微型叙事——"本体定特质，喻体加小事"。例如不说"月亮很圆"，说"月亮像谁放上去的白瓷碗，碗底还沾着几粒星星"。比喻的目的是让读者看到画面，不是被告知一个相似关系。
autoRewrite: false
defaultEnabled: true
defaultGlobalBaseline: false
