key: forbid-adult-in-child-view
name: 禁止童年视角混入成人审视
type: forbidden
severity: medium
description: 童年视角是滤镜，不是装天真。禁止在童年视角叙述中混入成年人的评判、概括和深度感悟，所有观察细节必须是小孩眼里的，成长后的感悟需明确标注时间距离。
detectPatterns:
  - 我那时就明白
  - 小小的我已经懂得
  - 童年的我知道
  - 作为一个孩子我理解
  - 那时我就感受到
  - 年幼的我深知
  - 那时候的我已经知道
rewriteSuggestion: 将成人化的概括和感悟拆开——观察细节保持在童年视角（小孩只看到表面），深刻感悟移到叙述的"现在时"，用"后来我才知道""如今回想起来"等时间标记区分。例如"我那时就知道她在保护我"→"她总在天黑前把院门插好，我不明白为什么，只觉得她动作真快"（童年）+"后来我才知道，那扇门挡的不是风"（成年后回望）。
promptInstruction: 使用童年视角时，所有观察和感受必须严格限制在儿童认知范围内。小孩可以看见颜色、听见声音、闻到气味、感到冷热，但不能做出成人的道德判断、情感概括或哲学思考。成人感悟必须用明确的时间标记（"后来""长大后""如今"）隔开，不能混入童年叙述流中。
autoRewrite: false
defaultEnabled: true
defaultGlobalBaseline: false
