key: forbid-emotion-label-action
name: 禁止情绪标签替代微动作
type: forbidden
severity: high
description: 禁止用"哭""笑""愤怒""感动"等抽象情绪标签直接告知读者人物状态，必须替换为具体的微动作、生理反应或神态细节，让读者自己判断情绪。
detectPatterns:
  - 哭着说
  - 笑着说
  - 她哭了起来
  - 他非常愤怒
  - 心里很难过
  - 感到十分感动
  - 她很开心
  - 他很生气
  - 很伤心
  - 非常吃力
  - 心里一阵酸
  - 眼泪忍不住
  - 感到一阵
  - 内心充满
rewriteSuggestion: 删除情绪标签词，替换为可感知的微动作和生理反应。例如"她哭着说"→"她把脸埋进掌心，低低的呜咽声从指缝溢出"；"他很愤怒"→"他牙关咬紧，手里的杯子被捏得嘎吱作响"；"非常吃力"→"他用两手攀着上面，两脚再向上缩，肥胖的身子向左微倾，显出努力的样子"。
promptInstruction: 严禁用情绪名词标签化人物状态。不要写"哭着说""很愤怒""心里难过"，必须用微动作（攀、缩、咬、攥）、生理反应（喉结滚动、呼吸变浅、手指发白）或神态细节替代。让读者通过画面自己判断情绪——"句句都是哭，却句句没提哭"。
autoRewrite: false
defaultEnabled: true
defaultGlobalBaseline: true
